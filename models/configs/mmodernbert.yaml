# Project
project_name: "ViEmo-Sentiment-Analysis"
mode: "train"  # train hoặc test

# Data
data:
  data_root: "data/"
  text_col: "text"
  label_col: "labels"
  n_classes: 28
  max_len: 512
  streaming: false

# Model
model:
  type: "m_modern_bert" # pho_bert, m_bert, m_modern_bert
  checkpoint_dir: "checkpoints"
  result_dir: "report"
  dropout: 0.1
  debug: false

# Strategy
train:
  batch_size: 32
  accumulate_steps: 2
  fp16: true
  lr: 1.0e-5
  epochs: 12
  num_workers: 24
  shuffle_size: 500000
  shuffle_seed: 42

# Loss
loss:
  ghm_bins: 10
  cb_beta: 0.999
